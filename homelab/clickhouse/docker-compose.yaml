networks:
  homelab:
    external: true

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    pull_policy: always

    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: tenzir
      CLICKHOUSE_DB: ocsf

    ports:
      - "8123:8123"
      - "9000:9000"

    ulimits:
      nofile:
        soft: 262144
        hard: 262144

    volumes:
      - /home/niels/lab/clickhouse/data:/var/lib/clickhouse
      - /home/niels/lab/clickhouse/logs:/var/log/clickhouse-server

    networks: [ homelab ]
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
